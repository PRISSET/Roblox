name: Build & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Launcher (Release x64)
      run: msbuild launcher\launcher.vcxproj /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /p:OutDir="${{ github.workspace }}\output\" /m

    - name: List output
      run: dir "${{ github.workspace }}\output" 2>$null; exit 0

    - name: Delete old release
      run: |
        gh release delete latest --yes --cleanup-tag 2>$null
        exit 0
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Create Release
      run: |
        if (Test-Path "${{ github.workspace }}\output\launcher.exe") {
          gh release create latest "${{ github.workspace }}\output\launcher.exe" --title "Turtle.Club Launcher" --notes "Скачай launcher.exe и запусти. GUI лаунчер скачает все файлы и запустит loader." --latest
        } else {
          Write-Error "launcher.exe not found"
          exit 1
        }
      env:
        GH_TOKEN: ${{ github.token }}
